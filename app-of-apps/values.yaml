apps:
  argo-cd:
    namespace: argocd
    project: default

  cilium:
    namespace: kube-system
    project: infrastructure

  metrics-server:
    namespace: kube-system
    project: infrastructure

  gpu-operator:
    namespace: gpu-operator
    project: infrastructure
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          pod-security.kubernetes.io/enforce: privileged
      syncOptions:
        - CreateNamespace=true
        - RespectIgnoreDifferences=true

repoURL: https://github.com/Raiyajin/homelab-setup.git

defaults:
  type: helm
  project: default
  finalizer: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences: []

cluster: "https://kubernetes.default.svc"
