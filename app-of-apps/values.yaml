apps:
  argo-cd:
    namespace: argocd
    project: default

  cilium:
    namespace: kube-system
    project: infrastructure


repoURL: https://github.com/Raiyajin/homelab-setup.git

defaults:
  type: helm
  project: default
  finalizer: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences: []

cluster: "https://kubernetes.default.svc"
