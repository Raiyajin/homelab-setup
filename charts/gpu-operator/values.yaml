nvidia-gpu-operator:
  # Pre-installed on the node by Talos
  driver:
    enabled: false
  toolkit:
    enabled: false

  validator:
    driver:
      env:
        - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
          value: "true"
        - name: WITH_WAIT
          value: "false"

  devicePlugin:
    enabled: true
  # Metrics exporter
  dcgmExporter:
    enabled: false
  # Automatic node labelling
  node-feature-discovery:
    enabled: true

    master:
      config:
        extraLabelNs: ["feature.node.kubernetes.io", "nvidia.com"]
        labelWhiteList: '^(cpu|memory|gpu|pci|kernel|storage|nvidia\.com|system-os_release\.ID).*'