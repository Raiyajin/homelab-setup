apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: talos-os-version-fix
  namespace: gpu-operator
spec:
  rules:
    - name: fix-talos-version-id
      labels:
        feature.node.kubernetes.io/system-os_release.VERSION_ID: "1.12.6"
      matchFeatures:
        - feature: system.osRelease
          matchExpressions:
            ID:
              op: In
              values: ["talos"]
