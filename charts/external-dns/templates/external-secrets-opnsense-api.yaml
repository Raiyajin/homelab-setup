apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ index .Values.global "opnsense-api-secret-name" }}
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: openbao-homelab
    kind: ClusterSecretStore
  target:
    name: {{ index .Values.global "opnsense-api-secret-name" }}
  data:
  - secretKey: api-key
    remoteRef:
      key: kubernetes/talos-cluster/opnsense/external-dns/api-credentials
      property: api-key
  - secretKey: api-secret
    remoteRef:
      key: kubernetes/talos-cluster/opnsense/external-dns/api-credentials
      property: api-secret
  - secretKey: host
    remoteRef:
      key: kubernetes/talos-cluster/opnsense/external-dns/api-credentials
      property: host