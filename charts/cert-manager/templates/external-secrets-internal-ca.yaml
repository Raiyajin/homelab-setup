apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ index .Values.global "caSecret" }}
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: openbao-homelab
    kind: ClusterSecretStore
  target:
    name: {{ index .Values.global "caSecret" }}
  data:
  - secretKey: cert
    remoteRef:
      key: kubernetes/talos-cluster/ca/internal
      property: cert