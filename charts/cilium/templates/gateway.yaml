{{- range $name, $config := .Values.gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: "openbao-homelab"
spec:
  gatewayClassName: cilium
  addresses:
    {{- toYaml .addresses | nindent 4 }}
  listeners:
    {{- toYaml .listeners | nindent 4 }}
---
{{- end }}
