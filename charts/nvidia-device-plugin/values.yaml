nvdp:
  gfd:
    enabled: true

  deviceDiscoveryStrategy: "nvml"
  nvidiaDriverRoot: "/usr/local/glibc/usr/lib"

  securityContext:
    capabilities:
      add:
        - SYS_ADMIN

  runtimeClassName: nvidia
